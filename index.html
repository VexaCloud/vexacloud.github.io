<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Redirecting...</title>
  <meta http-equiv="refresh" content="3;url=https://example.com" />
  <style>
    :root {
      --bg: #020617;
      --card: #0b1120;
      --accent: #1d4ed8;
      --accent-hover: #2563eb;
      --text-main: #e5e7eb;
      --text-muted: #9ca3af;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, #0f172a 0, #020617 55%);
      color: var(--text-main);
    }

    .wrapper {
      background: var(--card);
      border-radius: 14px;
      padding: 32px 28px;
      max-width: 420px;
      width: 100%;
      box-shadow:
        0 18px 45px rgba(15, 23, 42, 0.9),
        0 0 0 1px rgba(30, 64, 175, 0.35);
      text-align: center;
    }

    .title {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 22px;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border-radius: 999px;
      border: 3px solid rgba(148, 163, 184, 0.35);
      border-top-color: var(--accent);
      margin: 0 auto 20px;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 18px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      background: var(--accent);
      color: #e5e7eb;
      font-size: 0.95rem;
      font-weight: 500;
      transition: background 0.15s ease, transform 0.1s ease, box-shadow 0.15s ease;
      box-shadow: 0 10px 25px rgba(37, 99, 235, 0.45);
    }

    .button:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 14px 30px rgba(37, 99, 235, 0.55);
    }

    .button:active {
      transform: translateY(0);
      box-shadow: 0 8px 18px rgba(37, 99, 235, 0.4);
    }

    .hint {
      margin-top: 14px;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .url {
      color: #93c5fd;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="spinner"></div>
    <div class="title">Redirecting to the authorized application…</div>
    <div class="subtitle">
      This page will redirect you automatically in a moment.
    </div>

    <button class="button" onclick="manualRedirect()">
      Redirect
      <span aria-hidden="true">↻</span>
    </button>

    <div class="hint">
    </div>
  </div>

  <script>
    const TARGET_URL = "https://vexacloud.vexacloud.deno.net/198782/";

    function manualRedirect() {
      window.location.href = TARGET_URL;
    }

    // Optional: try JS redirect slightly before meta refresh
    setTimeout(() => {
      if (document.visibilityState === "visible") {
        manualRedirect();
      }
    }, 2000);
  </script>
</body>
</html>
